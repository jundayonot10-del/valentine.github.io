<form class="form-group">
  <label>Which day: (select a date)</label>

  <div>
    <input type="date" id="datePicker" />

    <button
      class="button"
      type="button"
      onclick="saveDate()"
    >
      Submit
    </button>
  </div>
</form>

<script>
function saveDate() {

  const selectedDate =
    document.getElementById("datePicker").value;

  localStorage.setItem(
    "selectedDate",
    selectedDate
  );

  window.location.href = "food.html";
}
</script>
