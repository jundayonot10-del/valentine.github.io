<html lang="en">

<body>

```
<h1 title="choose a date">
    As your bestfriend, Are you free on ...
</h1>

<form class="form-group">

    <label>Which day: (select a date)</label>

    <div>

        <input
            type="date"
            id="datePicker"
            required
        />

        <button
            class="button"
            type="button"
            onclick="saveDate()"
        >
            Submit
        </button>

    </div>

</form>

<script>

    function saveDate() {

        const selectedDate =
            document.getElementById("datePicker").value;

        if (!selectedDate) {
            alert("Please select a date first.");
            return;
        }

        localStorage.setItem(
            "selectedDate",
            selectedDate
        );

        window.location.href = "food.html";
    }

</script>
```
