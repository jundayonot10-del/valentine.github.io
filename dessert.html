<script>
    function saveDessert() {

        let selectedDesserts = [];

        document
            .querySelectorAll('input[name="dessert"]:checked')
            .forEach(item => {
                selectedDesserts.push(item.value);
            });

        if (selectedDesserts.length === 0) {
            alert("Please select at least one dessert.");
            return;
        }

        localStorage.setItem(
            "selectedDessert",
            JSON.stringify(selectedDesserts)
        );

        window.location.href = "activities.html";
    }
</script>
