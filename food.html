<button class="button" onclick="saveFood()">
    Let's proceed
</button>

<script>
    function saveFood() {

        let selectedFoods = [];

        document
            .querySelectorAll('input[name="food"]:checked')
            .forEach(item => {
                selectedFoods.push(item.value);
            });

        if (selectedFoods.length === 0) {
            alert("Please select at least one food.");
            return;
        }

        localStorage.setItem(
            "selectedFood",
            JSON.stringify(selectedFoods)
        );

        window.location.href = "dessert.html";
    }
</script>
